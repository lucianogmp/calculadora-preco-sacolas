<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Sacolas de Papel - Precificação Inteligente</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f8f1f1; margin: 0; padding: 20px; }
    .container { max-width: 900px; margin: auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: #c81e6c; }
    .aba { display: none; } .aba.active { display: block; }
    input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; }
    button { background: #c81e6c; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    button:hover { background: #a01857; }
    .resultado { background: #fff0f5; padding: 20px; border-radius: 10px; margin-top: 20px; font-size: 1.1em; }
    table { width: 100%; border-collapse: collapse; margin: 15px 0; }
    th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛍️ Calculadora de Sacolas Personalizadas de Papel</h1>

    <label>Tamanho da Sacola:</label>
    <select id="tamanho" onchange="calcular()">
      <option value="0.28">Pequena (20x25x8cm) - 0,28 m²</option>
      <option value="0.38" selected>Média (25x35x10cm) - 0,38 m²</option>
      <option value="0.52">Grande (30x40x12cm) - 0,52 m²</option>
    </select>

    <label>Gramatura do Papel (g/m²):</label>
    <input type="number" id="gramatura" value="130" oninput="calcular()">

    <label>Preço do Papel por Kg (R$):</label>
    <input type="number" id="precoKg" value="9.50" step="0.10" oninput="calcular()">

    <label>Impressão + Laminação (R$):</label>
    <input type="number" id="impressao" value="2.15" step="0.10" oninput="calcular()">

    <label>Alças + Ilhós + Reforço (R$):</label>
    <input type="number" id="acessorios" value="0.87" step="0.10" oninput="calcular()">

    <label>Tempo de montagem por sacola (minutos):</label>
    <input type="number" id="tempo" value="2.5" step="0.1" oninput="calcular()">

    <label>Valor da sua hora (R$):</label>
    <input type="number" id="valorHora" value="35" oninput="calcular()">

    <label>Custo Fixo Rateado por Sacola (R$):</label>
    <input type="number" id="custoFixo" value="1.50" step="0.10" oninput="calcular()">

    <button onclick="calcular()">🔄 Calcular Agora</button>

    <div class="resultado" id="resultado">
      <h2>Resultado</h2>
      <table id="tabela"></table>
    </div>
  </div>

  <script>
    function calcular() {
      const area = parseFloat(document.getElementById('tamanho').value);
      const gramatura = parseFloat(document.getElementById('gramatura').value);
      const precoKg = parseFloat(document.getElementById('precoKg').value);
      const impressao = parseFloat(document.getElementById('impressao').value);
      const acessorios = parseFloat(document.getElementById('acessorios').value);
      const tempoMin = parseFloat(document.getElementById('tempo').value);
      const valorHora = parseFloat(document.getElementById('valorHora').value);
      const custoFixo = parseFloat(document.getElementById('custoFixo').value);

      // Cálculo do papel
      const peso = (area * gramatura) / 1000;
      const custoPapel = peso * precoKg * 1.25; // 25% desperdício

      // Mão de obra
      const custoMaoObra = (tempoMin / 60) * valorHora;

      const custoTotal = custoPapel + impressao + acessorios + custoMaoObra + custoFixo;

      // Gera tabela
      let html = `
        <tr><td><strong>Custo do Papel</strong></td><td>R$ ${custoPapel.toFixed(2)}</td></tr>
        <tr><td>Impressão + Laminação</td><td>R$ ${impressao.toFixed(2)}</td></tr>
        <tr><td>Alças + Ilhós + Reforço</td><td>R$ ${acessorios.toFixed(2)}</td></tr>
        <tr><td>Mão de Obra</td><td>R$ ${custoMaoObra.toFixed(2)}</td></tr>
        <tr><td>Custos Fixos</td><td>R$ ${custoFixo.toFixed(2)}</td></tr>
        <tr style="font-weight:bold; background:#ffe6f0;"><td><strong>CUSTO TOTAL</strong></td><td><strong>R$ ${custoTotal.toFixed(2)}</strong></td></tr>
      `;

      // Sugestões de preço
      html += `<tr><td colspan="2"><strong>Preços Sugeridos de Venda:</strong></td></tr>`;
      [50, 70, 80, 100].forEach(margem => {
        const precoVenda = custoTotal * (1 + margem/100);
        html += `<tr><td>Margem ${margem}%</td><td><strong>R$ ${precoVenda.toFixed(2)}</strong></td></tr>`;
      });

      document.getElementById('tabela').innerHTML = html;
    }

    // Calcula automaticamente ao carregar
    window.onload = calcular;
  </script>
</body>
</html>
